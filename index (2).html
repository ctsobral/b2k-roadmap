<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>B2K Roadmap BUCS-345 v2026-04-16</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#12172B;--bg2:#1A2035;--border:rgba(255,255,255,0.09);--border2:rgba(255,255,255,0.18);
  --text:#F0F0F5;--muted:#8B8FA3;--dim:#3D4160;
  --done:#21C25E;--build:#3B82F6;--pri:#F59E0B;--disc:#A855F7;--wish:#64748B;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;}
nav{position:fixed;top:0;left:0;right:0;z-index:300;background:rgba(18,23,43,.98);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);height:44px;display:flex;align-items:center;padding:0 16px;gap:6px;}
.nbrand{font-weight:800;font-size:14px;color:var(--text);margin-right:8px;}.nbrand span{color:#21C25E;}
.nsep{width:1px;height:20px;background:var(--border);flex-shrink:0;}
.nright{margin-left:auto;font-size:11px;color:var(--muted)}.nright b{color:#21C25E;}
.sf{padding:4px 10px;border-radius:100px;font-size:11px;font-weight:600;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .18s;}
.sf:hover{border-color:var(--border2);color:var(--text);}
.sf-done{background:rgba(33,194,94,.15);border-color:rgba(33,194,94,.4);color:#21C25E;}
.sf-build{background:rgba(59,130,246,.15);border-color:rgba(59,130,246,.4);color:#3B82F6;}
.sf-pri{background:rgba(245,158,11,.15);border-color:rgba(245,158,11,.4);color:#F59E0B;}
.sf-disc{background:rgba(168,85,247,.15);border-color:rgba(168,85,247,.4);color:#A855F7;}
.sf-wish{background:rgba(100,116,139,.15);border-color:rgba(100,116,139,.4);color:#94A3B8;}
.qbar{position:fixed;top:44px;left:0;right:0;z-index:290;background:rgba(18,23,43,.98);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 16px;display:flex;align-items:center;gap:5px;height:44px;overflow-x:auto;}
.qbar::-webkit-scrollbar{height:3px;}.qbar::-webkit-scrollbar-thumb{background:var(--dim);border-radius:10px;}
.qb{flex-shrink:0;padding:5px 14px;border-radius:9px;font-size:12px;font-weight:700;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px;}
.qb:hover{background:rgba(255,255,255,.04);border-color:var(--border2);color:var(--text);}
.qb.sel{color:var(--text);}
.qb[data-q="all"].sel{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.2);}
.qb[data-q="Q1 2026"].sel{background:rgba(59,130,246,.12);border-color:rgba(59,130,246,.4);color:#3B82F6;}
.qb[data-q="Q2 2026"].sel{background:rgba(168,85,247,.12);border-color:rgba(168,85,247,.4);color:#A855F7;}
.qb[data-q="Q3 2026"].sel{background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.4);color:#F59E0B;}
.qb[data-q="Q4 2026"].sel{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.4);color:#EF4444;}
.qb[data-q="Backlog"].sel{background:rgba(100,116,139,.12);border-color:rgba(100,116,139,.4);color:#94A3B8;}
.qcnt{font-size:10px;padding:2px 6px;border-radius:100px;font-weight:700;}
.sbar{max-width:100%;margin:0;padding:90px 16px 6px;display:flex;gap:8px;flex-wrap:nowrap;overflow-x:auto;}
.sc{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:8px 14px;flex:1;min-width:100px;cursor:pointer;transition:all .2s;}
.sc:hover{border-color:var(--border2);}
.sc .lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:3px;}
.sc .num{font-size:20px;font-weight:900;}
.sc .sub{font-size:10px;color:var(--muted);margin-top:1px;}
.main{max-width:100%;margin:0;padding:0 16px 20px;}
.qtrow{display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap;}
.qtrow h2{font-size:18px;font-weight:800;}
.qper{font-size:12px;color:var(--muted);padding:3px 10px;border-radius:100px;background:rgba(255,255,255,.04);border:1px solid var(--border);}
.leg{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:4px;align-items:center;}
.leg-i{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted);}
.leg-sw{width:20px;height:8px;border-radius:3px;}
.gantt{display:grid;grid-template-columns:300px 1fr;border:1px solid var(--border);border-radius:10px;overflow:hidden;background:var(--bg2);align-items:start;}
.lp{border-right:1px solid var(--border);}
.lph{height:56px;max-height:56px;min-height:56px;display:flex;align-items:flex-end;padding:6px 10px;border-bottom:1px solid var(--border);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);box-sizing:border-box;}
.er{display:flex;align-items:center;padding:0 8px;height:58px;max-height:58px;min-height:58px;border-bottom:1px solid var(--border);gap:6px;overflow:hidden;box-sizing:border-box;}
.er:hover{background:rgba(255,255,255,.025);}
.er-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.er-key{font-size:10px;color:var(--dim);flex-shrink:0;width:72px;text-decoration:none;font-family:monospace;transition:color .15s;margin-top:1px;display:block;overflow:hidden;text-overflow:ellipsis;}
.er-key:hover{color:#21C25E;}
.er-info{flex:1;min-width:0;overflow:hidden;}
.er-name{font-size:11px;color:var(--text);line-height:1.3;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.er-dates{font-size:9px;color:#4A5170;margin-top:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.rp{overflow-x:auto;}.rp::-webkit-scrollbar{height:4px;}.rp::-webkit-scrollbar-thumb{background:var(--dim);border-radius:10px;}
.gi{position:relative;min-width:600px;}
.ghq{position:relative;height:28px;border-bottom:1px solid var(--border);background:var(--bg2);}
.ghm{position:relative;height:28px;border-bottom:1px solid var(--border);background:var(--bg2);}
.ghqc{display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;border-right:1px solid var(--border);flex-shrink:0;}
.ghmc{display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);border-right:1px solid var(--border);flex-shrink:0;}
.gr{position:relative;height:58px;max-height:58px;min-height:58px;border-bottom:1px solid var(--border);display:flex;align-items:center;box-sizing:border-box;overflow:hidden;}
.gr:hover{background:rgba(255,255,255,.02);}
.gc{height:100%;flex-shrink:0;border-right:1px solid rgba(255,255,255,.02);}
.gbar{position:absolute;height:28px;border-radius:6px;top:50%;transform:translateY(-50%);display:flex;align-items:center;padding:0 7px;font-size:9.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;transition:all .2s;z-index:3;border:1px solid transparent;}
.gbar:hover{filter:brightness(1.2);transform:translateY(-50%) scaleY(1.08);z-index:20;}
.gb-done{background:rgba(33,194,94,.22);border-color:rgba(33,194,94,.5);color:#4ADE80;}
.gb-build{background:rgba(59,130,246,.22);border-color:rgba(59,130,246,.5);color:#60A5FA;}
.gb-pri{background:rgba(245,158,11,.20);border-color:rgba(245,158,11,.5);color:#FCD34D;}
.gb-disc{background:rgba(168,85,247,.20);border-color:rgba(168,85,247,.5);color:#C084FC;}
.gb-wish{background:rgba(100,116,139,.14);border-color:rgba(100,116,139,.4);color:#94A3B8;}
.today-l{position:absolute;top:0;bottom:0;width:1px;border-left:2px dashed rgba(255,255,255,.2);z-index:15;pointer-events:none;}
.today-lbl{position:absolute;top:0;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.1);color:rgba(255,255,255,.45);font-size:7.5px;font-weight:700;padding:2px 4px;border-radius:3px;white-space:nowrap;}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;color:var(--muted);text-align:center;gap:8px;}
.blt{width:100%;border-collapse:collapse;font-size:12px;}
.blt th{text-align:left;padding:10px 14px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);border-bottom:1px solid var(--border);}
.blt td{padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle;}
.blt tr:hover td{background:rgba(255,255,255,.02);}
.blt a{color:var(--muted);text-decoration:none;font-size:11px;font-family:monospace;}.blt a:hover{color:#21C25E;}
.tt{position:fixed;z-index:1000;background:#161B2E;border:1px solid var(--border2);border-radius:12px;padding:14px 16px;max-width:300px;pointer-events:none;opacity:0;transition:opacity .15s;box-shadow:0 12px 40px rgba(0,0,0,.6);}
.tt.show{opacity:1;}
.tt-key{font-size:10px;color:var(--muted);margin-bottom:3px;}
.tt-title{font-size:13px;font-weight:700;margin-bottom:7px;line-height:1.35;color:var(--text);}
.tt-badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:100px;font-size:10px;font-weight:700;margin-bottom:9px;}
.tt-row{display:flex;gap:8px;font-size:11px;color:var(--muted);margin-bottom:3px;}
.tt-lbl{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:#63B3ED;min-width:78px;padding-top:1px;}
.tt-val{color:var(--text);font-weight:500;}
.tt-desc{font-size:11px;color:var(--muted);margin-top:8px;line-height:1.5;border-top:1px solid var(--border);padding-top:8px;}

/* Gantt unificado — uma única tabela */
.gantt-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:10px;background:var(--bg2);}
.gantt-wrap::-webkit-scrollbar{height:4px;}
.gantt-wrap::-webkit-scrollbar-thumb{background:var(--dim);border-radius:10px;}
.gantt-table{border-collapse:collapse;width:100%;min-width:900px;}
.gantt-table tr{height:58px;}
.gantt-table td,.gantt-table th{border-bottom:1px solid var(--border);box-sizing:border-box;padding:0;}
.gantt-table tr:last-child td{border-bottom:none;}
.gantt-table tr:hover td{background:rgba(255,255,255,.02);}
/* Coluna fixa esquerda */
.g-left{width:300px;min-width:300px;max-width:300px;padding:0 8px;vertical-align:middle;position:sticky;left:0;z-index:10;background:var(--bg2);}
.g-left-hdr{width:300px;min-width:300px;max-width:300px;padding:6px 10px;vertical-align:bottom;position:sticky;left:0;z-index:11;background:var(--bg2);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);height:56px;border-bottom:1px solid var(--border);}
/* Coluna do gráfico */

.g-chart-hdr2{vertical-align:middle;height:28px;border-bottom:1px solid var(--border);padding:0;background:var(--bg2);}

.gantt-table{border-collapse:collapse;width:100%;min-width:900px;}
.gantt-table tr{height:58px;}
.gantt-table td,.gantt-table th{border-bottom:1px solid var(--border);box-sizing:border-box;padding:0;}
.gantt-table tr:last-child td{border-bottom:none;}
.gantt-table tr:hover td{background:rgba(255,255,255,.02);}
/* Coluna fixa esquerda */
.g-left{width:300px;min-width:300px;max-width:300px;padding:0 8px;vertical-align:middle;position:sticky;left:0;z-index:10;background:var(--bg2);}
.g-left-hdr{width:300px;min-width:300px;max-width:300px;padding:6px 10px;vertical-align:bottom;position:sticky;left:0;z-index:11;background:var(--bg2);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);height:56px;border-bottom:1px solid var(--border);}
/* Coluna do gráfico */
.g-chart{position:relative;vertical-align:middle;}
.g-chart-hdr{vertical-align:bottom;height:28px;border-bottom:1px solid var(--border);padding:0;background:var(--bg2);}
.g-chart-hdr2{vertical-align:middle;height:28px;border-bottom:1px solid var(--border);padding:0;background:var(--bg2);}
/* Conteúdo da célula esquerda */
.er-wrap{display:flex;align-items:center;gap:6px;height:58px;overflow:hidden;}
.er-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.er-key{font-size:10px;color:var(--dim);flex-shrink:0;width:72px;text-decoration:none;font-family:monospace;}
.er-key:hover{color:#21C25E;}
.er-info{flex:1;min-width:0;overflow:hidden;}
.er-name{font-size:11px;color:var(--text);line-height:1.3;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.er-dates{font-size:9px;color:#4A5170;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
/* Célula do gráfico */
.g-cell{position:relative;height:58px;overflow:hidden;}
.g-bgcol{height:100%;flex-shrink:0;border-right:1px solid rgba(255,255,255,.02);position:absolute;top:0;}
.today-l{position:absolute;top:0;bottom:0;width:1px;border-left:2px dashed rgba(255,255,255,.2);z-index:15;pointer-events:none;}
.today-lbl{position:absolute;top:0;left:50%;transform:translateX(-50%);background:rgba(255,255,255,.1);color:rgba(255,255,255,.45);font-size:7px;font-weight:700;padding:2px 4px;border-radius:3px;white-space:nowrap;}

</style>

// ── DATE HELPERS — T12:00:00 evita shift de timezone ──────────────────────
function sd(s){ return s ? new Date(s + "T12:00:00") : null; }
function fmtL(s){ // long — para tooltip
  if(!s) return "--";
  return sd(s).toLocaleDateString("pt-BR",{day:"2-digit",month:"short",year:"numeric"});
}
function fmtS(s){ // short — para painel
  if(!s) return "--";
  return sd(s).toLocaleDateString("pt-BR",{day:"2-digit",month:"short",year:"2-digit"});
}
function pct(s,tlS,TOTAL){
  if(!s) return null;
  return Math.max(0,Math.min(100,(sd(s)-tlS)/TOTAL*100));
}
function todayStr(){
  var n=new Date();
  return n.getFullYear()+"-"+String(n.getMonth()+1).padStart(2,"0")+"-"+String(n.getDate()).padStart(2,"0");
}

// ── QUARTER SELECT ──────────────────────────────────────────────────────────
function selQ(btn){
  var q = btn.getAttribute("data-q");
  AQ = q;
  document.querySelectorAll(".qb").forEach(function(b){b.classList.remove("sel");});
  btn.classList.add("sel");
  var qr = QR[q];
  var titles = {
    "all":"&#x1F5FA; Todos os Quarters",
    "Q1 2026":"&#x26C4; Q1/26","Q2 2026":"&#x1F338; Q2/26",
    "Q3 2026":"&#x2600; Q3/26","Q4 2026":"&#x1F342; Q4/26",
    "Backlog":"&#x1F4CB; Backlog"
  };
  document.getElementById("qTitle").innerHTML = titles[q]||q;
  document.getElementById("qTitle").style.color = qr ? qr.color : "#94A3B8";
  document.getElementById("qPer").textContent = qr ? qr.period : "Sem data definida";
  render();
}
function selQByName(q){
  var btn = document.querySelector(".qb[data-q=\""+q+"\"]");
  if(btn) selQ(btn);
}

// ── STATUS TOGGLE ───────────────────────────────────────────────────────────
function togS(btn){
  var s = btn.getAttribute("data-s");
  var on = Object.values(AS).filter(Boolean).length;
  if(AS[s] && on===1) return;
  AS[s] = !AS[s];
  var map = {done:"sf-done",build:"sf-build",prioritized:"sf-pri",discovery:"sf-disc",wishlist:"sf-wish"};
  btn.className = "sf" + (AS[s] ? " " + (map[s]||"") : "");
  render();
}

// ── RENDER ──────────────────────────────────────────────────────────────────
function render(){
  var mount = document.getElementById("mount");
  var filtered = G2.filter(function(e){
    if(!AS[e.status]) return false;
    if(AQ==="all") return true;
    return e.quarter===AQ;
  });
  document.getElementById("qCnt").textContent = filtered.length+" \u00e9picos";
  if(AQ==="Backlog"){ renderBacklog(filtered,mount); return; }
  if(!filtered.length){
    mount.innerHTML="<div class=\"empty\"><div style=\"font-size:36px\">&#x1F50D;</div><div style=\"font-size:14px;font-weight:600;color:var(--text)\">Nenhum \u00e9pico para este filtro</div></div>";
    return;
  }
  var qr=QR[AQ]||QR["all"];
  var tlS=sd(qr.s), tlE=sd(qr.e);
  var TOTAL=tlE-tlS, TDAYS=TOTAL/86400000;
  var months=[], mc=new Date(tlS.getFullYear(),tlS.getMonth(),1);
  while(+new Date(mc)<=+tlE){ months.push(new Date(mc)); mc.setMonth(mc.getMonth()+1); }
  function mw(m){
    var d1=new Date(m.getFullYear(),m.getMonth(),1);
    var d2=new Date(m.getFullYear(),m.getMonth()+1,0);
    var s2=Math.max(+d1,+tlS), e2=Math.min(+d2,+tlE);
    return Math.max(0,(e2-s2)/TOTAL*100);
  }
  var todayP=pct(todayStr(),tlS,TOTAL);
  // Header row 1: quarters
  var qHdr="<tr><th class=\"g-left-hdr\">\u00c9pico / Start \u2192 Limite</th>";
  var QBANDS_CELLS=QBANDS.map(function(qb){
    var qs=sd(qb.s),qe=sd(qb.e);
    if(+qe<+tlS||+qs>+tlE) return "";
    var l=Math.max(0,(+qs-+tlS)/TOTAL*100);
    var r=Math.min(100,(+qe-+tlS)/TOTAL*100);
    var w=(r-l).toFixed(2);
    if(w<=0) return "";
    return "<th class=\"g-chart-hdr\" colspan=\"1\" style=\"position:absolute;left:"+l.toFixed(2)+"%;width:"+w+"%;height:28px;"+qb.c+";display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;border-right:1px solid var(--border);\">"+qb.l+"</th>";
  }).join("");
  // Usar uma div absoluta para os quarter bands sobre a linha de meses
  // Header row 1: quarters como div overlay
  var qBandsHtml="<div style=\"position:absolute;top:0;left:0;right:0;height:28px;pointer-events:none;\">"+
    QBANDS.map(function(qb){
      var qs=sd(qb.s),qe=sd(qb.e);
      if(+qe<+tlS||+qs>+tlE) return "";
      var l=Math.max(0,(+qs-+tlS)/TOTAL*100);
      var r2=Math.min(100,(+qe-+tlS)/TOTAL*100);
      var w=(r2-l).toFixed(2);
      if(w<=0) return "";
      return "<div style=\"position:absolute;left:"+l.toFixed(2)+"%;width:"+w+"%;height:100%;"+qb.c+";display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;border-right:1px solid var(--border);\">"+qb.l+"</div>";
    }).join("")+
  "</div>";
  // Header row 2: meses
  var mHdr = months.map(function(m){
    var d1str=m.getFullYear()+"-"+String(m.getMonth()+1).padStart(2,"0")+"-01";
    var lp=pct(d1str,tlS,TOTAL);
    var w=mw(m).toFixed(2);
    var lbl=m.toLocaleDateString("pt-BR",{month:"short",year:"2-digit"}).toUpperCase();
    return "<div style=\"position:absolute;left:"+lp.toFixed(2)+"%;width:"+w+"%;height:28px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);border-right:1px solid var(--border);box-sizing:border-box;\">"+lbl+"</div>";
  }).join("");
  // Linha de hoje
  var todayHtml=(todayP!==null&&todayP>=0&&todayP<=100)
    ?"<div class=\"today-l\" style=\"left:"+todayP.toFixed(2)+"%\"><div class=\"today-lbl\">Hoje</div></div>":
    "";
  // Montar tabela
  var rows=filtered.map(function(epic){
    var sm=ST[epic.status]||ST.wishlist;
    var sp=pct(epic.start,tlS,TOTAL);
    var ep=pct(epic.due,tlS,TOTAL);
    var startFmt=fmtS(epic.start);
    var dueFmt=fmtS(epic.due);
    // Barra
    var bar="";
    if(sp!==null&&ep!==null){
      var bw=Math.max(0.5,ep-sp);
      var lbl=bw>4?(epic.name.length>40?epic.name.slice(0,38)+"\u2026":epic.name):"";
      var ek=epic.key;
      bar="<div class=\"gbar "+sm.cls+"\" style=\"left:"+sp.toFixed(2)+"%;width:"+bw.toFixed(2)+"%\" "+
          "onmouseenter=\"showTT(event,'"+ek+"')\" onmouseleave=\"hideTT()\" "+
          "onclick=\"window.open('https://picpay.atlassian.net/browse/"+ek+"','_blank')\">"+lbl+"</div>";
    } else if(sp!==null){
      var ek2=epic.key;
      bar="<div class=\"gbar "+sm.cls+"\" style=\"left:"+sp.toFixed(2)+"%;width:1%\" "+
          "onmouseenter=\"showTT(event,'"+ek2+"')\" onmouseleave=\"hideTT()\">&#x25C6;</div>";
    }
    return "<tr>"+
      "<td class=\"g-left\">"+
        "<div class=\"er-wrap\">"+
          "<div class=\"er-dot\" style=\"background:"+sm.dot+"\"></div>"+
          "<a class=\"er-key\" href=\"https://picpay.atlassian.net/browse/"+epic.key+"\" target=\"_blank\">"+epic.key+"</a>"+
          "<div class=\"er-info\">"+
            "<div class=\"er-name\">"+epic.name+"</div>"+
            "<div class=\"er-dates\">"+startFmt+" &#x2192; "+dueFmt+"</div>"+
          "</div>"+
        "</div>"+
      "</td>"+
      "<td class=\"g-chart\">"+
        "<div class=\"g-cell\" style=\"position:relative;height:58px;\">"+
          todayHtml+bar+
        "</div>"+
      "</td>"+
    "</tr>";
  }).join("");
  // Chart width = 100% do container menos 300px da coluna fixa
  var chartW = "calc(100% - 300px)";
  mount.innerHTML=
    "<div class=\"gantt-wrap\">"+
      "<table class=\"gantt-table\">"+
        "<thead>"+
          "<tr style=\"height:28px;\">"+
            "<th class=\"g-left-hdr\" rowspan=\"2\">\u00c9pico / Start \u2192 Limite</th>"+
            "<th style=\"padding:0;border-bottom:1px solid var(--border);height:28px;position:relative;\">"+
              "<div style=\"position:relative;height:28px;overflow:hidden;\">"+qBandsHtml+"</div>"+
            "</th>"+
          "</tr>"+
          "<tr style=\"height:28px;\">"+
            "<th style=\"padding:0;border-bottom:1px solid var(--border);height:28px;position:relative;\">"+
              "<div style=\"position:relative;height:28px;overflow:hidden;\">"+todayHtml+mHdr+"</div>"+
            "</th>"+
          "</tr>"+
        "</thead>"+
        "<tbody>"+rows+"</tbody>"+
      "</table>"+
    "</div>";
  // Scroll para hoje
  setTimeout(function(){
    var w=mount.querySelector(".gantt-wrap");
    if(!w) return;
    var tbl=w.querySelector(".gantt-table");
    if(!tbl||todayP===null) return;
    var chartWidth=tbl.offsetWidth-300;
    w.scrollLeft=Math.max(0,chartWidth*todayP/100-w.offsetWidth/3);
  },80);
}

var TT = document.getElementById("tt");
function showTT(evt, key){
  var e = EMAP[key];
  if(!e) return;
  var sm = ST[e.status]||ST.wishlist;
  document.getElementById("ttKey").textContent   = key;
  document.getElementById("ttTitle").textContent = e.name;
  var b = document.getElementById("ttBadge");
  b.textContent = sm.lbl;
  b.style.cssText = "background:rgba(255,255,255,.06);color:"+sm.dot+";border:1px solid "+sm.dot+"44;";
  // START DATE = epic.start (created no Jira)
  document.getElementById("ttStart").textContent = fmtL(e.start);
  // DATA LIMITE = epic.due (duedate no Jira)
  document.getElementById("ttDue").textContent   = fmtL(e.due);
  document.getElementById("ttAsg").textContent   = e.assignee || "Sem responsável";
  document.getElementById("ttQ").textContent     = e.quarter;
  document.getElementById("ttMvp").textContent   = e.mvp;
  var d = document.getElementById("ttDesc");
  d.textContent = e.desc || "";
  d.style.display = e.desc ? "block" : "none";
  TT.classList.add("show");
  posT(evt);
}
function hideTT(){ TT.classList.remove("show"); }
function posT(evt){
  var x=evt.clientX+16, y=evt.clientY-60;
  TT.style.left = (x+320>window.innerWidth ? x-340 : x)+"px";
  TT.style.top  = Math.max(8, Math.min(y, window.innerHeight-240))+"px";
}
document.addEventListener("mousemove",function(e){
  if(TT.classList.contains("show")) posT(e);
});

// INIT
render();
</script>
</body>
</html>
